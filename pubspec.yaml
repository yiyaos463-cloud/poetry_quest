    - assets/images/emei/layer_libai_boat.png
    - assets/images/emei/layer_willow_leaves.png
    - assets/images/emei/mood_qingleng.png
    - assets/images/emei/mood_kaikuo.png
    - assets/images/emei/hard_starry_bg.png
    - assets/images/emei/layer_panorama_v2.png
    - assets/images/emei/layer_libai_boat_v2.png
    - assets/images/outfits/outfit_libai_shudi_qingshan.png
    - assets/images/outfits/outfit_libai_lushan_yunhe.png
    - assets/images/outfits/outfit_libai_jingyesi_yuebai.png
    - assets/images/outfits/outfit_libai_xinglunan_changfeng.png
    - assets/images/outfits/outfit_libai_qiangjinjiu_jinzun.png
    - assets/images/outfits/outfit_libai_baidi_qingzhou.png
    - assets/images/outfits/outfit_libai_dapeng_chuitian.png
    - assets/audio/correct.mp3
    - assets/audio/incorrect.mp3
