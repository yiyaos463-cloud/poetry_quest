name: poetry_quest
description: "A journey through Tang poetry with Li Bai."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0-144.0.dev

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.1
  page_view_indicators: ^2.0.0
  shared_preferences: ^2.2.2
  audioplayers: ^6.0.0
  http: ^1.6.0
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/audio/libai_intro.mp3
